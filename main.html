<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }
        .header {
            background: #fff;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .header-title {
            font-size: 18px;
            font-weight: 500;
            color: #333;
        }
        .logout-btn {
            padding: 8px 16px;
            background: #fff;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            color: #ff4d4f;
            border-color: #ff4d4f;
        }
        .content {
            padding: 24px;
        }
        .welcome-card {
            background: #fff;
            border-radius: 8px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .welcome-card h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 16px;
        }
        .welcome-card p {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">管理系统</div>
        <button class="logout-btn" id="logoutBtn">退出登录</button>
    </div>
    <div class="content">
        <div class="welcome-card">
            <h2>登录成功</h2>
            <p>欢迎使用管理系统</p>
        </div>
    </div>

    <script>
        (function() {
            // 检查是否已登录
            var token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            // 退出登录
            document.getElementById('logoutBtn').addEventListener('click', function() {
                localStorage.removeItem('token');
                localStorage.removeItem('phone');
                window.location.href = 'login.html';
            });
        })();
    </script>
</body>
</html>

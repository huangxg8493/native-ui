<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图标预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .header {
      position: sticky;
      top: 0;
      background: #fff;
      padding: 16px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 100;
      margin-bottom: 20px;
      border-radius: 8px;
    }
    .search-box {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 2px solid #e8e8e8;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.3s;
    }
    .search-box:focus {
      border-color: #1890ff;
    }
    .stats {
      margin-top: 12px;
      font-size: 14px;
      color: #666;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 16px;
    }
    .icon-item {
      background: #fff;
      border-radius: 8px;
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid #e8e8e8;
    }
    .icon-item:hover {
      border-color: #1890ff;
      box-shadow: 0 4px 12px rgba(24,144,255,0.2);
      transform: translateY(-2px);
    }
    .icon-item svg {
      width: 32px;
      height: 32px;
      color: #333;
    }
    .icon-name {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      text-align: center;
      word-break: break-all;
      max-width: 100%;
    }
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }
    .loading {
      text-align: center;
      padding: 60px;
      color: #999;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <input type="text" class="search-box" id="searchInput" placeholder="搜索图标名称...">
    <div class="stats" id="stats"></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="toast" id="toast">已复制到剪贴板</div>

  <script>
    (function() {
      const grid = document.getElementById('grid');
      const searchInput = document.getElementById('searchInput');
      const stats = document.getElementById('stats');
      const toast = document.getElementById('toast');
      let allIcons = [];

      // 加载 SVG 文件并解析 symbol 元素
      async function loadSvgIcons() {
        const svgFiles = [
          { url: 'ant-design-icons.svg', prefix: 'ant-' },
          { url: 'element-plus-icons.svg', prefix: 'el-' }
        ];

        for (const file of svgFiles) {
          try {
            const resp = await fetch(file.url);
            const text = await resp.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(text, 'image/svg+xml');
            const symbols = doc.querySelectorAll('symbol');
            symbols.forEach(symbol => {
              const id = symbol.getAttribute('id');
              if (id) {
                allIcons.push({
                  id: id,
                  prefix: file.prefix,
                  viewBox: symbol.getAttribute('viewBox') || '0 0 1024 1024'
                });
              }
            });

            // 将 SVG 内容注入页面，使 <use> 生效
            const svgContainer = document.createElement('div');
            svgContainer.style.display = 'none';
            svgContainer.innerHTML = text;
            document.body.appendChild(svgContainer);
          } catch (e) {
            console.warn('加载', file.url, '失败:', e);
          }
        }

        // 按 ID 排序
        allIcons.sort((a, b) => a.id.localeCompare(b.id));
        renderIcons();
        updateStats();
      }

      // 渲染图标网格
      function renderIcons(filter) {
        grid.innerHTML = '';
        const filtered = filter
          ? allIcons.filter(icon => icon.id.toLowerCase().includes(filter.toLowerCase()))
          : allIcons;

        if (filtered.length === 0) {
          grid.innerHTML = '<div class="loading">未找到匹配图标</div>';
          return;
        }

        filtered.forEach(icon => {
          const item = document.createElement('div');
          item.className = 'icon-item';
          item.dataset.iconId = icon.id;

          // 生成 SVG symbol 引用代码
          const svgCode = `<svg><use href="#${icon.id}"></use></svg>`;

          item.innerHTML = `
            <svg>
              <use href="#${icon.id}"></use>
            </svg>
            <span class="icon-name">${icon.id}</span>
          `;

          item.addEventListener('click', () => copyToClipboard(icon.id, svgCode));
          grid.appendChild(item);
        });
      }

      // 复制到剪贴板
      function copyToClipboard(id, code) {
        // 复制完整的使用代码
        const codeToCopy = `<svg><use href="#${id}"></use></svg>`;
        navigator.clipboard.writeText(codeToCopy).then(() => {
          showToast();
        }).catch(() => {
          // 降级方案
          const textarea = document.createElement('textarea');
          textarea.value = codeToCopy;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          showToast();
        });
      }

      // 显示提示
      function showToast() {
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      }

      // 更新统计信息
      function updateStats(filter) {
        const filtered = filter
          ? allIcons.filter(icon => icon.id.toLowerCase().includes(filter.toLowerCase()))
          : allIcons;
        if (filter) {
          stats.textContent = `显示 ${filtered.length} / ${allIcons.length} 个图标`;
        } else {
          stats.textContent = `共 ${allIcons.length} 个图标`;
        }
      }

      // 搜索过滤
      searchInput.addEventListener('input', (e) => {
        const filter = e.target.value.trim();
        renderIcons(filter);
        updateStats(filter);
      });

      // 启动
      loadSvgIcons();
    })();
  </script>
</body>
</html>

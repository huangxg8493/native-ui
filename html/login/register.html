<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <link rel="stylesheet" href="../../styles/login.css">
</head>
<body>
    <div class="login-card">
        <h1 class="login-title">用户注册</h1>
        <form id="registerForm">
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="text" id="phone" name="phone" placeholder="请输入手机号" autocomplete="off">
                <div class="field-error" id="phoneError"></div>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码">
            </div>
            <button type="submit" class="login-btn" id="registerBtn">注册</button>
            <div class="error-msg" id="errorMsg"></div>
            <div class="register-guide">
                已有账号？<a href="login.html">去登录</a>
            </div>
        </form>
    </div>

    <script>
        (function() {
            // Toast 消息弹窗
            function showToast(message, type, duration) {
                var existing = document.querySelector('.toast');
                if (existing) existing.remove();
                var toast = document.createElement('div');
                toast.className = 'toast ' + type;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(function() {
                    toast.remove();
                }, duration || 3000);
            }

            var form = document.getElementById('registerForm');
            var registerBtn = document.getElementById('registerBtn');
            var errorMsg = document.getElementById('errorMsg');
            var phoneError = document.getElementById('phoneError');
            var phoneInput = document.getElementById('phone');

            function validatePhone() {
                var phone = phoneInput.value.trim();
                phoneError.textContent = '';
                phoneError.classList.remove('visible');
                if (!phone) {
                    return;
                }
                if (!/^1[3-9]\d{9}$/.test(phone)) {
                    phoneError.textContent = '请输入正确的手机号';
                    phoneError.classList.add('visible');
                }
            }

            function validatePhoneRequired() {
                var phone = phoneInput.value.trim();
                phoneError.textContent = '';
                phoneError.classList.remove('visible');
                if (!phone) {
                    phoneError.textContent = '请输入手机号';
                    phoneError.classList.add('visible');
                    return false;
                }
                if (!/^1[3-9]\d{9}$/.test(phone)) {
                    phoneError.textContent = '请输入正确的手机号';
                    phoneError.classList.add('visible');
                    return false;
                }
                return true;
            }

            // 手机号输入框失去焦点时验证
            phoneInput.addEventListener('blur', validatePhone);

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                var phone = phoneInput.value.trim();
                var password = document.getElementById('password').value;
                var confirmPassword = document.getElementById('confirmPassword').value;

                // 前端验证
                errorMsg.textContent = '';

                if (!validatePhoneRequired()) {
                    return;
                }
                if (!password) {
                    errorMsg.textContent = '请输入密码';
                    return;
                }
                if (!confirmPassword) {
                    errorMsg.textContent = '请输入确认密码';
                    return;
                }
                if (password !== confirmPassword) {
                    errorMsg.textContent = '两次输入密码不一致';
                    return;
                }

                registerBtn.disabled = true;
                registerBtn.textContent = '注册中...';

                // 调用注册接口
                fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phone: phone,
                        password: password
                    })
                })
                .then(function(response) {
                    return response.json();
                })
                .then(function(res) {
                    if (res.code === '200') {
                        showToast('注册成功，请登录', 'success');
                        setTimeout(function() {
                            window.location.href = 'login.html';
                        }, 1500);
                    } else {
                        errorMsg.textContent = res.message || '注册失败';
                        registerBtn.disabled = false;
                        registerBtn.textContent = '注册';
                    }
                })
                .catch(function(err) {
                    errorMsg.textContent = '网络异常，请稍后重试';
                    registerBtn.disabled = false;
                    registerBtn.textContent = '注册';
                });
            });
        })();
    </script>
</body>
</html>

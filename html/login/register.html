<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <link rel="stylesheet" href="../../styles/login.css">
</head>
<body>
    <div class="login-card">
        <h1 class="login-title">用户注册</h1>
        <form id="registerForm">
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="text" id="phone" name="phone" placeholder="请输入手机号" autocomplete="off">
                <div class="field-error" id="phoneError"></div>
            </div>
            <div class="form-group">
                <label for="userName">用户名称</label>
                <input type="text" id="userName" name="userName" placeholder="请输入用户名" autocomplete="off">
            </div>
            <div class="collapse-bar" id="collapseToggle">
                <span class="collapse-line"></span>
                <span class="collapse-text">更多</span>
                <span class="collapse-arrow">▼</span>
            </div>
            <div class="optional-fields hidden">
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="text" id="email" name="email" placeholder="请输入邮箱" autocomplete="off">
                    <div class="field-error" id="emailError"></div>
                </div>
                <div class="form-group">
                    <label for="province">省份</label>
                    <input type="text" id="province" name="province" placeholder="请输入省份">
                </div>
                <div class="form-group">
                    <label for="city">城市</label>
                    <input type="text" id="city" name="city" placeholder="请输入城市">
                </div>
                <div class="form-group">
                    <label for="district">区县</label>
                    <input type="text" id="district" name="district" placeholder="请输入区县">
                </div>
                <div class="form-group">
                    <label for="hobby">爱好</label>
                    <input type="text" id="hobby" name="hobby" placeholder="请输入爱好">
                </div>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码">
            </div>
            <button type="submit" class="login-btn" id="registerBtn">注册</button>
            <div class="error-msg" id="errorMsg"></div>
            <div class="register-guide">
                已有账号？<a href="login.html">去登录</a>
            </div>
        </form>
    </div>

    <script>
        (function() {
            // Toast 消息弹窗
            function showToast(message, type, duration) {
                var existing = document.querySelector('.toast');
                if (existing) existing.remove();
                var toast = document.createElement('div');
                toast.className = 'toast ' + type;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(function() {
                    toast.remove();
                }, duration || 3000);
            }

            var form = document.getElementById('registerForm');
            var registerBtn = document.getElementById('registerBtn');
            var errorMsg = document.getElementById('errorMsg');
            var phoneError = document.getElementById('phoneError');
            var phoneInput = document.getElementById('phone');
            var emailError = document.getElementById('emailError');
            var emailInput = document.getElementById('email');
            var collapseToggle = document.getElementById('collapseToggle');
            var optionalFields = document.querySelector('.optional-fields');
            var collapseArrow = collapseToggle.querySelector('.collapse-arrow');
            var collapseText = collapseToggle.querySelector('.collapse-text');

            var moreExpanded = false;

            collapseToggle.addEventListener('click', function() {
                moreExpanded = !moreExpanded;
                if (moreExpanded) {
                    optionalFields.classList.remove('hidden');
                    collapseArrow.textContent = '▲';
                    collapseText.textContent = '收起';
                } else {
                    optionalFields.classList.add('hidden');
                    collapseArrow.textContent = '▼';
                    collapseText.textContent = '更多';
                }
            });

            function validatePhone() {
                var phone = phoneInput.value.trim();
                phoneError.textContent = '';
                phoneError.classList.remove('visible');
                if (!phone) {
                    return;
                }
                if (!/^1[3-9]\d{9}$/.test(phone)) {
                    phoneError.textContent = '请输入正确的手机号';
                    phoneError.classList.add('visible');
                }
            }

            function validateEmail() {
                var email = emailInput.value.trim();
                emailError.textContent = '';
                emailError.classList.remove('visible');
                if (!email) {
                    return;
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    emailError.textContent = '请输入正确的邮箱';
                    emailError.classList.add('visible');
                }
            }

            function validateEmailRequired() {
                var email = emailInput.value.trim();
                emailError.textContent = '';
                emailError.classList.remove('visible');
                if (!email) {
                    return true;
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    emailError.textContent = '请输入正确的邮箱';
                    emailError.classList.add('visible');
                    return false;
                }
                return true;
            }

            emailInput.addEventListener('blur', validateEmail);

            function validatePhoneRequired() {
                var phone = phoneInput.value.trim();
                phoneError.textContent = '';
                phoneError.classList.remove('visible');
                if (!phone) {
                    phoneError.textContent = '请输入手机号';
                    phoneError.classList.add('visible');
                    return false;
                }
                if (!/^1[3-9]\d{9}$/.test(phone)) {
                    phoneError.textContent = '请输入正确的手机号';
                    phoneError.classList.add('visible');
                    return false;
                }
                return true;
            }

            // 手机号输入框失去焦点时验证
            phoneInput.addEventListener('blur', validatePhone);

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                var phone = phoneInput.value.trim();
                var userName = document.getElementById('userName').value.trim();
                var email = document.getElementById('email').value.trim();
                var password = document.getElementById('password').value;
                var confirmPassword = document.getElementById('confirmPassword').value;
                var province = document.getElementById('province').value.trim();
                var city = document.getElementById('city').value.trim();
                var district = document.getElementById('district').value.trim();
                var hobby = document.getElementById('hobby').value.trim();

                // 前端验证
                errorMsg.textContent = '';

                if (!validatePhoneRequired()) {
                    return;
                }

                if (!userName) {
                    errorMsg.textContent = '请输入用户名称';
                    return;
                }

                if (!password) {
                    errorMsg.textContent = '请输入密码';
                    return;
                }

                if (!confirmPassword) {
                    errorMsg.textContent = '请输入确认密码';
                    return;
                }

                if (password !== confirmPassword) {
                    errorMsg.textContent = '两次输入密码不一致';
                    return;
                }

                if (!validateEmailRequired()) {
                    return;
                }

                // 注册接口需要的字段
                var registerData = {
                    phone: phone,
                    userName: userName,
                    email: email,
                    password: password,
                    province: province,
                    city: city,
                    district: district,
                    hobby: hobby
                };

                registerBtn.disabled = true;
                registerBtn.textContent = '注册中...';

                // 调用注册接口
                fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(registerData)
                })
                .then(function(response) {
                    return response.json();
                })
                .then(function(res) {
                    if (res.code === '200') {
                        showToast('注册成功，请登录', 'success');
                        setTimeout(function() {
                            window.location.href = 'login.html';
                        }, 1500);
                    } else {
                        errorMsg.textContent = res.message || '注册失败';
                        registerBtn.disabled = false;
                        registerBtn.textContent = '注册';
                    }
                })
                .catch(function(err) {
                    errorMsg.textContent = '网络异常，请稍后重试';
                    registerBtn.disabled = false;
                    registerBtn.textContent = '注册';
                });
            });
        })();
    </script>
</body>
</html>

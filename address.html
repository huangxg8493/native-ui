<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户地址管理</title>
    <link rel="stylesheet" href="address.css">
</head>
<body>
    <div class="container">
        <h1>客户地址管理</h1>
        <!-- 查询区域 -->
        <div class="search-bar">
            <div class="search-bar-row">
                <label>客户号</label>
                <input type="text" id="clientNoInput" placeholder="请输入客户号">
                <button id="queryBtn">查询</button>
            </div>
            <button id="addBtn">新增地址</button>
        </div>
        <!-- 地址列表 -->
        <table id="addressTable">
            <thead>
                <tr>
                    <th>序号</th>
                    <th>地址类型</th>
                    <th>地址详情</th>
                    <th>修改日期</th>
                    <th>通讯地址</th>
                    <th>最新地址</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="addressTableBody">
            </tbody>
        </table>
        <!-- 分页 -->
        <div class="pagination">
            <span id="pageInfo"></span>
            <select id="pageSizeSelect">
                <option value="5">5条/页</option>
                <option value="5" selected>5条/页</option>
                <option value="10">10条/页</option>
                <option value="20">20条/页</option>
                <option value="50">50条/页</option>
            </select>
            <button id="prevBtn">上一页</button>
            <button id="nextBtn">下一页</button>
        </div>
    </div>
    <!-- 弹窗 -->
    <div id="addressModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">新增地址</h2>
            <form id="addressForm">
                <input type="hidden" id="seqNo">
                <div class="form-row">
                    <label>地址类型:</label>
                    <select id="addressType"></select>
                </div>
                <div class="form-row">
                    <label>地址详情:</label>
                    <textarea id="addressDetail" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <label>通讯地址:</label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="isMailingAddress" value="Y"> 是</label>
                        <label class="radio-label"><input type="radio" name="isMailingAddress" value="N" checked> 否</label>
                    </div>
                </div>
                <div class="form-row">
                    <label>最新地址:</label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="isNewest" value="Y"> 是</label>
                        <label class="radio-label"><input type="radio" name="isNewest" value="N" checked> 否</label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancelBtn">取消</button>
                    <button type="submit">确定</button>
                </div>
            </form>
        </div>
    </div>
    <script src="address.js"></script>
</body>
</html>
